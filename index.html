<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Labs | Coming Soon...</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        brand: '#00f0ff', brandDeep: '#082f49',
                        surface: 'rgba(11, 17, 32, 0.65)', surfaceBorder: 'rgba(0, 240, 255, 0.15)',
                    },
                    boxShadow: {
                        'neon': '0 0 20px -5px rgba(0, 240, 255, 0.4)',
                        'neon-glow': '0 0 40px 0 rgba(0, 240, 255, 0.15)',
                    }
                }
            }
        }
    </script>

    <style>
        /*STYLES*/
        :root { color-scheme: dark; }
        body { background-color: #030712; color: #ffffff; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /*BACKGROUND*/
        #particle-canvas { position: fixed; inset: 0; z-index: -20; pointer-events: auto; }
        .bg-vignette { position: fixed; inset: 0; z-index: -10; background: radial-gradient(circle at 50% 50%, transparent 0%, #030712 100%); pointer-events: none; }
        .glass-panel { background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--surfaceBorder); border-radius: 1.25rem; }

        .type-container { display: flex; align-items: center; justify-content: center; }
        
        #typed-text {
            overflow: hidden;
            white-space: nowrap;
            width: 0px; /* Starts hidden */
        }

        .cursor { 
            display: inline-block; 
            width: 4px; 
            height: 1.1em; 
            background-color: #00f0ff; 
            margin-left: 8px; 
            box-shadow: 0 0 10px #00f0ff; 
            animation: blink 1s step-end infinite; 
            flex-shrink: 0; /* Keeps the cursor from shrinking */
        }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
    </style>
</head>
<body class="font-sans antialiased relative selection:bg-brand selection:text-black">

    <canvas id="particle-canvas"></canvas>
    <div class="bg-vignette"></div>

    <main class="relative z-10 w-full max-w-3xl px-6 flex flex-col items-center justify-center text-center">
        
        <div class="absolute inset-0 bg-gradient-to-r from-brandDeep to-brand rounded-[2rem] blur-3xl opacity-20 -z-10"></div>
        
        <div class="glass-panel p-10 md:p-16 w-full shadow-neon-glow border-t-2 border-t-brand/50 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-brand/10 rounded-full blur-[40px]"></div>

            <div class="inline-block px-5 py-2 rounded-full bg-brand/10 border border-brand/30 text-brand text-[10px] font-black tracking-[0.3em] uppercase mb-8 shadow-neon">
                OSINT Labs
            </div>
            
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight leading-[1.1] text-white uppercase mb-4 flex justify-center">
                <span class="type-container">
                    <span id="typed-text" class="text-brand drop-shadow-[0_0_15px_rgba(0,240,255,0.6)]">COMING SOON...</span>
                    <span class="cursor"></span>
                </span>
            </h1>

            <p class="text-gray-400 text-sm md:text-base mt-6 max-w-xl mx-auto font-medium font-mono tracking-wide opacity-80">
            </p>
        </div>
    </main>

    <script>
        // --- PARTICLES---
        class ParticleNetwork {
            constructor() {
                this.canvas = document.getElementById('particle-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.mouse = { x: null, y: null };
                this.init();
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                window.addEventListener('mousemove', (e) => { this.mouse.x = e.x; this.mouse.y = e.y; });
                
                for(let i = 0; i < 80; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        radius: Math.random() * 2 + 1
                    });
                }
                this.animate();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                for(let i = 0; i < this.particles.length; i++) {
                    let p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;

                    if(p.x < 0 || p.x > this.canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > this.canvas.height) p.vy *= -1;

                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    this.ctx.fillStyle = 'rgba(0, 240, 255, 0.2)';
                    this.ctx.fill();

                    for(let j = i; j < this.particles.length; j++) {
                        let p2 = this.particles[j];
                        let dx = p.x - p2.x;
                        let dy = p.y - p2.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);

                        if(dist < 150) {
                            this.ctx.beginPath();
                            this.ctx.moveTo(p.x, p.y);
                            this.ctx.lineTo(p2.x, p2.y);
                            this.ctx.strokeStyle = `rgba(0, 240, 255, ${0.1 - dist/1500})`;
                            this.ctx.stroke();
                        }
                    }

                    if(this.mouse.x) {
                        let dx = this.mouse.x - p.x;
                        let dy = this.mouse.y - p.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < 200) {
                            this.ctx.beginPath();
                            this.ctx.moveTo(p.x, p.y);
                            this.ctx.lineTo(this.mouse.x, this.mouse.y);
                            this.ctx.strokeStyle = `rgba(0, 240, 255, ${0.2 - dist/1000})`;
                            this.ctx.stroke();
                        }
                    }
                }
            }
        }

        // GLIDE ANIMATION
        window.onload = () => {
            new ParticleNetwork();

            setTimeout(() => {
                const textEl = document.getElementById('typed-text');
                const targetWidth = textEl.scrollWidth;

                textEl.animate([
                    { width: '0px' },
                    { width: targetWidth + 'px' }
                ], {
                    duration: 2000,
                    easing: 'ease-in-out',
                    fill: 'forwards'
                });
            }, 1000);
        };
    </script>
</body>
</html>
