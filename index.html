<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Labs | Coming Soon</title>
    <style>
        /* Black Background and Layout */
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Keeps the animation full screen */
            font-family: 'Courier New', monospace; /* Classic goth/hacker font */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* The Plexus Animation Canvas */
        #plexus {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Puts the animation behind the text */
        }

        /* Coming Soon Text Styling */
        .text-overlay {
            position: relative;
            z-index: 2; /* Puts the text on top */
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7); /* Subtle white glow */
            margin: 0;
            animation: fadeIn 3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="plexus"></canvas>

    <div class="text-overlay">
        <h1>Coming Soon...</h1>
    </div>

    <script>
        const canvas = document.getElementById('plexus');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 100; // Increase this for a denser web

        // Adjust canvas size to window
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Particle class
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1.5; // Speed X
                this.vy = (Math.random() - 0.5) * 1.5; // Speed Y
                this.radius = Math.random() * 2 + 1; // Particle size
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; // White particles
                ctx.fill();
            }

            update() {
                // Keep particles moving and bouncing off walls
                if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
                if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        // Initialize particles
        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // The main animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear previous frame

            for (let i = 0; i < particles.length; i++) {
                particles[i].draw();
                particles[i].update();

                // Draw lines between nearby particles
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    // Only draw lines within a certain distance
                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.lineWidth = 0.5; // Fine lines
                        ctx.strokeStyle = `rgba(255, 255, 255, ${1 - distance / 150})`; // White lines that fade
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
